<div id="askModeOverlay" style="display:none;position:fixed;inset:0;background:rgba(30,25,20,.44);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:120;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)askModeClose()">
  <div style="background:var(--card);border-radius:22px;max-width:400px;width:100%;padding:26px 24px 22px;box-shadow:0 20px 60px rgba(40,30,20,.28);border:1px solid var(--line);animation:askPop .22s cubic-bezier(.34,1.4,.5,1);">
    <div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#c15f3c,#d98a5f);display:flex;align-items:center;justify-content:center;margin-bottom:15px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6L12 2z"/></svg>
    </div>
    <div style="font-size:18px;font-weight:700;margin-bottom:5px;letter-spacing:-.2px;">Задать вопрос</div>
    <div style="font-size:13.5px;color:var(--txt2);margin-bottom:18px;line-height:1.45;">Открыть новый чат или спросить в текущем?</div>
    <div id="askModeQ" style="font-size:13.5px;font-weight:500;color:var(--txt);background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:18px;line-height:1.45;border-left:3px solid #c15f3c;"></div>
    <div style="display:flex;flex-direction:column;gap:9px;">
      <button onclick="askModeNew()" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:13px;background:var(--txt);color:var(--bg);border:none;cursor:pointer;font-family:inherit;text-align:left;transition:opacity .15s;" onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='1'">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="M12 5v14M5 12h14"/></svg>
        <span style="flex:1;"><span style="display:block;font-size:14px;font-weight:600;">Новый чат</span><span style="display:block;font-size:11.5px;opacity:.7;margin-top:1px;">Чистое начало, без прошлой переписки</span></span>
      </button>
      <button onclick="askModeContinue()" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:13px;background:var(--card);color:var(--txt);border:1px solid var(--line2);cursor:pointer;font-family:inherit;text-align:left;transition:background .15s;" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background='var(--card)'">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span style="flex:1;"><span style="display:block;font-size:14px;font-weight:600;">Продолжить здесь</span><span style="display:block;font-size:11.5px;color:var(--txt3);margin-top:1px;">С учётом текущей переписки</span></span>
      </button>
    </div>
    <button onclick="askModeClose()" style="width:100%;margin-top:12px;padding:8px;border-radius:9px;background:transparent;color:var(--txt3);border:none;font-size:13px;cursor:pointer;font-family:inherit;">Отмена</button>
  </div>
</div>
